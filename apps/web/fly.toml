app = "suniplayer-relay"
primary_region = "mia"  # Miami — más cerca de Venezuela/LATAM

[build]
  dockerfile = "Dockerfile.relay"

[http_service]
  internal_port = 8765
  force_https = false        # WebSocket no usa HTTPS, usa WSS
  auto_stop_machines = false # Siempre encendido para conexiones persistentes
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 8765

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.tcp_checks]
    interval = "15s"
    timeout = "2s"

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
